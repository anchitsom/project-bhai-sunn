# Promptfoo eval: Hindi STT — IndicConformer 600M decoder comparison
#
# Run from the project root, not from this directory:
#   cd <project root>
#   promptfoo eval -c eval/promptfooconfig.yaml
#   promptfoo view
#
# Why from the project root: the audio paths in test cases are relative
# (fixtures/audio/...). The STT server resolves them relative to its
# working directory, which the launchd plist sets to the project root.
# Promptfoo just passes the string through to the HTTP body.
#
# The launchd-managed STT server (com.anchit.bhai-sunn-stt) hosts the
# /transcribe endpoint at 127.0.0.1:8765 and stays up across reboots,
# so no warm-up step is needed before running this eval.
#
# Eval shape v0: side-by-side compare, no assertions. Read both
# transcripts manually. v1 (planned) adds Python WER assertions against
# hand-transcribed ground truth on a 30+ utterance labelled set.
#
# Whisper provider was decommissioned 2026-04-30 after the A/B in
# research/decommission-mlx-whisper-2026-04-30.md. If you need to
# re-add it for a regression run, revert the relevant commits and
# add a fourth provider entry pointing at the Whisper path.

description: 'Hindi STT — IndicConformer 600M (RNNT vs CTC)'

prompts:
  - '{{audio_path}}'

providers:
  - id: 'http://127.0.0.1:8765/transcribe#rnnt'
    label: 'IndicConformer 600M (RNNT)'
    config:
      url: 'http://127.0.0.1:8765/transcribe'
      method: POST
      headers:
        Content-Type: application/json
      body:
        path: '{{audio_path}}'
        decoder: rnnt
        language: hi
      transformResponse: 'json.text'

  - id: 'http://127.0.0.1:8765/transcribe#ctc'
    label: 'IndicConformer 600M (CTC)'
    config:
      url: 'http://127.0.0.1:8765/transcribe'
      method: POST
      headers:
        Content-Type: application/json
      body:
        path: '{{audio_path}}'
        decoder: ctc
        language: hi
      transformResponse: 'json.text'

tests:
  - description: 'TG-001: short greeting "Bhai Sunn kaisa hai"'
    vars:
      audio_path: fixtures/audio/tg-001-greeting.oga
      # ground_truth: 'भाई सुन कैसा है'  # uncomment once verified

  - description: 'TG-002: longer utterance with proper noun (Adamya)'
    vars:
      audio_path: fixtures/audio/tg-002-adamya.oga
      # ground_truth: 'भाई सुन अदम्या की पैंट फट गई'  # tentative; awaiting reference

